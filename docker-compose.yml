services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: csp-backend
    env_file:
      - ./.env
    restart: unless-stopped
    # ports:
    #   - "8080:8080"  # uncomment for direct backend access during development
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # All auth config (Cognito, mockUser, famClientId) is injected at runtime
      # via amplify-config.js — edit frontend/public/amplify-config.js locally.
    container_name: csp-frontend
    environment:
      BACKEND_URL: backend:8080
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge