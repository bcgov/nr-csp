# Reusable Deploy - Lite Mode Verification
name: Reusable Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub/OpenShift environment
        default: ""
        type: string
      target:
        description: Deployment target; usually PR number, test or prod
        default: ${{ github.event.number }}
        type: string
      tag:
        description: Container tag
        default: ${{ github.event.number }}
        type: string
      triggers:
        description: Triggers for deployment
        default: ""
        type: string

    secrets:
      oc_namespace:
        description: OpenShift namespace
        required: true
      oc_token:
        description: OpenShift token
        required: true
      # Backend secrets
      spring_datasource_url:
        description: Oracle JDBC URL
        required: true
      spring_datasource_username:
        description: Oracle database username
        required: true
      spring_datasource_password:
        description: Oracle database password
        required: true
      keystore_secret:
        description: Oracle wallet init container secret
        required: true
      jasper_server_username:
        description: Jasper Reports server username
        required: false
      jasper_server_password:
        description: Jasper Reports server password
        required: false
      # Backend config
      database_host:
        description: Oracle DB hostname
        required: true
      database_service_name:
        description: Oracle service name
        required: true
      jwt_jwks_uri:
        description: JWKS endpoint for JWT validation
        required: false
      jwt_issuer:
        description: Expected JWT issuer claim
        required: false
      jwt_audience:
        description: Expected JWT audience claim
        required: false
      jasper_server_login_url:
        description: Jasper login URL
        required: false
      jasper_server_fetch_url:
        description: Jasper fetch URL
        required: false
      jasper_server_put_url:
        description: Jasper put URL
        required: false
      jasper_server_report_uri_base:
        description: Jasper report URI base
        required: false

    outputs:
      triggered:
        description: Has deployment been triggered?
        value: ${{ jobs.init.outputs.triggered }}

permissions: {}

jobs:
  init:
    name: Deploy (init)
    environment: ${{ inputs.environment }}
    outputs:
      triggered: ${{ steps.deploy.outputs.triggered }}
    runs-on: ubuntu-24.04
    steps:
      - uses: bcgov/action-deployer-openshift@fc51e6a5849eb0fdb9395ceed9c1059aa25b3815 # v4.1.1
        id: deploy
        with:
          file: common/openshift.init.yml
          oc_namespace: ${{ secrets.oc_namespace }}
          oc_server: ${{ vars.oc_server }}
          oc_token: ${{ secrets.oc_token }}
          overwrite: true
          parameters:
            -p ZONE="${{ inputs.target }}"
            -p NAME="${{ github.event.repository.name }}"
            -p SPRING_DATASOURCE_URL="${{ secrets.spring_datasource_url }}"
            -p SPRING_DATASOURCE_USERNAME="${{ secrets.spring_datasource_username }}"
            -p SPRING_DATASOURCE_PASSWORD="${{ secrets.spring_datasource_password }}"
            -p KEYSTORE_SECRET="${{ secrets.keystore_secret }}"
            -p JASPER_SERVER_USERNAME="${{ secrets.jasper_server_username }}"
            -p JASPER_SERVER_PASSWORD="${{ secrets.jasper_server_password }}"
            -p DATABASE_HOST="${{ secrets.database_host }}"
            -p DATABASE_SERVICE_NAME="${{ secrets.database_service_name }}"
            -p JWT_JWKS_URI="${{ secrets.jwt_jwks_uri }}"
            -p JWT_ISSUER="${{ secrets.jwt_issuer }}"
            -p JWT_AUDIENCE="${{ secrets.jwt_audience }}"
            -p JASPER_SERVER_LOGIN_URL="${{ secrets.jasper_server_login_url }}"
            -p JASPER_SERVER_FETCH_URL="${{ secrets.jasper_server_fetch_url }}"
            -p JASPER_SERVER_PUT_URL="${{ secrets.jasper_server_put_url }}"
            -p JASPER_SERVER_REPORT_URI_BASE="${{ secrets.jasper_server_report_uri_base }}"
          triggers: ${{ inputs.triggers }}
          debug: true

  deploy:
    name: Deploy (${{ matrix.name }})
    environment: ${{ inputs.environment }}
    needs: [init]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      matrix:
        name: [backend, frontend]
        include:
          - name: backend
            file: backend/openshift.deploy.yml
            parameters: -p IMAGE_TAG="${{ inputs.tag }}"
          - name: frontend
            file: frontend/openshift.deploy.yml
            parameters: -p IMAGE_TAG="${{ inputs.tag }}"
    outputs:
      triggered: ${{ steps.deploy.outputs.triggered }}
    steps:
      - uses: bcgov/action-deployer-openshift@fc51e6a5849eb0fdb9395ceed9c1059aa25b3815 # v4.1.1
        id: deploy
        with:
          file: ${{ matrix.file }}
          oc_namespace: ${{ secrets.oc_namespace }}
          oc_server: ${{ vars.oc_server }}
          oc_token: ${{ secrets.oc_token }}
          debug: true
          parameters:
            -p ZONE="${{ inputs.target }}"
            -p NAME="${{ github.event.repository.name }}"
            ${{ matrix.parameters }}
          triggers: ${{ inputs.triggers }}
