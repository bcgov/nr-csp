name: PR

on:
  pull_request:

concurrency:
  group: ${{ github.event.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  # ZONE for OpenShift objects is the PR number mapped into 1-50, capping how
  # many PR environments can exist at once. Images keep the real PR number.
  init:
    name: Initialize
    runs-on: ubuntu-slim
    timeout-minutes: 1
    outputs:
      zone: ${{ steps.zone.outputs.zone }}
    steps:
      - id: zone
        run: echo "zone=$(( (${{ github.event.number }} - 1) % 50 + 1 ))" >> $GITHUB_OUTPUT

  # https://github.com/bcgov/action-builder-ghcr
  builds:
    name: Builds
    permissions:
      attestations: write
      id-token: write
      packages: write
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        package: [backend, frontend]
    timeout-minutes: 10
    steps:
      - uses: bcgov/actions/builder-ghcr@v0.4.0 # v0.4.0
        with:
          package: ${{ matrix.package }}
          tags: ${{ github.event.number }}
          tag_fallback: latest
          triggers: ('${{ matrix.package }}/', 'common/', '.github/workflows/')
          build_args: |
            BUILDKIT_INLINE_CACHE=1


  deploys:
    name: Deploys (${{ github.event.number }})
    needs: [builds, init]
    uses: ./.github/workflows/reusable-deploy.yml
    secrets:
      oc_namespace: ${{ secrets.oc_namespace }}
      oc_token: ${{ secrets.oc_token }}
      spring_datasource_url: ${{ secrets.spring_datasource_url }}
      spring_datasource_username: ${{ secrets.spring_datasource_username }}
      spring_datasource_password: ${{ secrets.spring_datasource_password }}
      keystore_secret: ${{ secrets.keystore_secret }}
      jasper_server_username: ${{ secrets.jasper_server_username }}
      jasper_server_password: ${{ secrets.jasper_server_password }}
      database_host: ${{ secrets.database_host }}
      database_service_name: ${{ secrets.database_service_name }}
      jwt_jwks_uri: ${{ secrets.jwt_jwks_uri }}
      jwt_issuer: ${{ secrets.jwt_issuer }}
      jwt_audience: ${{ secrets.jwt_audience }}
      jasper_server_login_url: ${{ secrets.jasper_server_login_url }}
      jasper_server_fetch_url: ${{ secrets.jasper_server_fetch_url }}
      jasper_server_put_url: ${{ secrets.jasper_server_put_url }}
      jasper_server_report_uri_base: ${{ secrets.jasper_server_report_uri_base }}
    with:
      target: ${{ needs.init.outputs.zone }}
      triggers: ('backend/', 'frontend/', 'common/', '.github/workflows/')

  tests:
     name: Tests
     if: needs.deploys.outputs.triggered == 'true'
     needs: [deploys, init]
     uses: ./.github/workflows/reusable-tests.yml
     with:
       target: ${{ needs.init.outputs.zone }}

  # ==========================================================================
  # WARNING: This job acts as the required merge gate for this workflow.
  # If you add a new job to this workflow, you MUST add its ID to the 'needs'
  # array below, otherwise its failure or cancellation will not block the PR!
  # ==========================================================================
  results:
    name: PR Results
    needs: [init, builds, deploys, tests]
    if: always()
    runs-on: ubuntu-slim
    timeout-minutes: 1
    steps:
      - name: Log Job Results Context
        run: |
          echo "=== Upstream Job Statuses ==="
          echo '${{ toJson(needs) }}'

      - name: Evaluate Overall Status
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "❌ Critical Check Failure: At least one required job has failed or was cancelled."
          exit 1

      - name: Success Message
        run: echo "✅ All critical checks passed or were intentionally skipped!"
