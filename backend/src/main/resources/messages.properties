# -----------------------------------------------------------------------------
# Validation message bundle.
#
# Wording is copied VERBATIM from the legacy CSP application's
#   old-csp/nr-csp/src/main/resources/ca/bc/gov/mof/csp/common/messages.properties
# (the manual-entry bundle). For keys not present there we fall back to
#   old-csp/nr-csp/src/main/resources/ca/bc/gov/mof/csp/common/esfMessages.properties
# (the electronic-submission bundle). Any remaining key without an old-CSP
# equivalent is hand-written below.
#
# Placeholders use Spring's MessageFormat syntax: {0}, {1}, ... matching the
# `args` array passed by the validators in
# ca.bc.gov.nrs.csp.backend.util.validation.invoiceDetails.*
# -----------------------------------------------------------------------------

