invoice.replace.with.itself.error=Invoice cannot be replaced by itself.
invoice.morethanmax.replace.invoicenum.error=The Replaces Invoice No. must be up to {0} numbers.
invoice.adjust.invoicenumber.error=The Adjusts Invoice No. {0} do not identify another invoice for this Client.
invoice.adjust.with.itself.error=Invoice cannot be adjusted by itself.
invoice.morethanmax.adjust.invoicenum.error=The Adjusts Invoice No. must be up to {0} numbers.
invoice.validation.adjustedInvoiceCancelled=Cannot adjust cancelled or deleted invoices.
