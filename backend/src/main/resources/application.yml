spring:
  autoconfigure:
    exclude: org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration

server:
  servlet:
    context-path: /
  forward-headers-strategy: framework

# ===================================================================
# CSP submission XML validation
# These parameters make the otherwise application-agnostic validation
# pipeline specific to CSP. Defaults live in
# SubmissionValidationProperties; listed here for visibility/override.
# ===================================================================
csp:
  submission:
    validation:
      schema-classpath-root: schemas/csp/
      entry-schema: schemas/csp/mof-csp.xsd
      jaxb-context-path: ca.bc.gov.nrs.csp.backend.invoice.submission.generated
      envelope-namespace: http://www.for.gov.bc.ca/schema/esf
      envelope-root: ESFSubmission
      envelope-content-element: submissionContent
      body-namespace: http://www.for.gov.bc.ca/schema/csp
      body-root: CSPSubmission

springdoc:
  api-docs:
    path: /api/v3/api-docs
  swagger-ui:
    path: /api/swagger-ui.html
    url: /api/v3/api-docs
    disable-swagger-default-url: true
    enabled: true

# ===================================================================
# JasperReports Server Configuration
# All values are injected via env vars (OpenShift Secret in deployment,
# .env locally) — no endpoints or credentials live in the repo.
# ===================================================================
jasper:
  server:
    login-url: ${JASPER_SERVER_LOGIN_URL}
    fetch-url: ${JASPER_SERVER_FETCH_URL}
    put-url: ${JASPER_SERVER_PUT_URL}
    report-uri-base: ${JASPER_SERVER_REPORT_URI_BASE}
    username: ${JASPER_SERVER_USERNAME}
    password: ${JASPER_SERVER_PASSWORD}
    ssl-verify: ${JASPER_SERVER_SSL_VERIFY:true}
    read-timeout-seconds: ${JASPER_SERVER_READ_TIMEOUT_SECONDS:300}

# ===================================================================
# JWT / JWKS Configuration
# ===================================================================
security:
  jwt:
    jwks-uri: ${JWT_JWKS_URI}
    issuer: ${JWT_ISSUER}
    audience: ${JWT_AUDIENCE}

# ===================================================================
# Logging — per-package levels (override via env or logging.level.*)
# ===================================================================
logging:
  level:
    root: INFO
    ca.bc.gov.nrs.csp: INFO
    org.springframework: INFO
    org.springframework.security: WARN

---
# Local development profile
# Empty fallbacks let the app boot without Jasper/Cognito configured;
# set the env vars in .env when those integrations are needed.
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: oracle.jdbc.OracleDriver

jasper:
  server:
    login-url: ${JASPER_SERVER_LOGIN_URL:}
    fetch-url: ${JASPER_SERVER_FETCH_URL:}
    put-url: ${JASPER_SERVER_PUT_URL:}
    report-uri-base: ${JASPER_SERVER_REPORT_URI_BASE:}
    username: ${JASPER_SERVER_USERNAME:}
    password: ${JASPER_SERVER_PASSWORD:}

security:
  jwt:
    jwks-uri: ${JWT_JWKS_URI:}
    issuer: ${JWT_ISSUER:}
    audience: ${JWT_AUDIENCE:}

auth:
  mock:
    enabled: ${AUTH_MOCK_ENABLED:true}
    username: local-dev-user
    roles: ${AUTH_MOCK_ROLES:ADMIN}

logging:
  level:
    ca.bc.gov.nrs.csp: DEBUG
    org.springframework.security: DEBUG

---
# Production profile (all credentials injected by OpenShift env vars)
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver

auth:
  mock:
    enabled: false
